# Dependabot version updates. Security updates and alerts are enabled at the
# repository level; this file governs scheduled version-bump PRs.
# Bun (text bun.lock) is supported by the npm ecosystem since Feb 2025.
version: 2
updates:
  # Library dependencies (root package.json + bun.lock).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Demo app (docs site) dependencies.
  - package-ecosystem: "npm"
    directory: "/demo"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      demo:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used by the CI, site, tonk, and CodeQL workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns: ["*"]
