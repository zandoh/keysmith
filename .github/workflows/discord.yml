name: discord

on:
  workflow_run:
    workflows: [ci, site]
    types: [completed]
  release:
    types: [published]

permissions:
  actions: read

jobs:
  failure:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: notify failure
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          [ -n "$WEBHOOK_URL" ] || { echo "DISCORD_WEBHOOK not set; skipping"; exit 0; }
          jq -n \
            --arg wf "$WF_NAME" \
            --arg branch "$BRANCH" \
            --arg msg "$(printf '%s' "$COMMIT_MSG" | head -n1)" \
            --arg sha "$(printf '%.7s' "$SHA")" \
            --arg url "$RUN_URL" \
            '{embeds: [{
              title: "❌ \($wf) failed on \($branch)",
              url: $url,
              color: 15548997,
              description: "\($msg) (`\($sha)`)"
            }]}' \
            | curl -sSf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"

  recovery:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: notify recovery
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          WF_ID: ${{ github.event.workflow_run.workflow_id }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          [ -n "$WEBHOOK_URL" ] || { echo "DISCORD_WEBHOOK not set; skipping"; exit 0; }
          prev=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?branch=$BRANCH&status=completed&per_page=50" \
            | jq -r --argjson n "$RUN_NUMBER" \
              '[.workflow_runs[] | select(.run_number < $n)] | sort_by(.run_number) | last | .conclusion // empty')
          if [ "$prev" != "failure" ]; then
            echo "previous run concluded '${prev:-none}'; not a recovery"
            exit 0
          fi
          jq -n \
            --arg wf "$WF_NAME" \
            --arg branch "$BRANCH" \
            --arg msg "$(printf '%s' "$COMMIT_MSG" | head -n1)" \
            --arg sha "$(printf '%.7s' "$SHA")" \
            --arg url "$RUN_URL" \
            '{embeds: [{
              title: "✅ \($wf) back to green on \($branch)",
              url: $url,
              color: 5763719,
              description: "\($msg) (`\($sha)`)"
            }]}' \
            | curl -sSf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"

  # Releases are published manually (changeset publish runs locally), so the
  # release event is user-authored and does trigger this workflow.
  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: announce npm publish
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
        run: |
          [ -n "$WEBHOOK_URL" ] || { echo "DISCORD_WEBHOOK not set; skipping"; exit 0; }
          version="${TAG#v}"
          notes=$(printf '%s' "$NOTES" | sed -E 's/^#+ +(.*)$/**\1**/' | head -c 4000)
          jq -n \
            --arg title "📦 @zandoh/keysmith $version published to npm" \
            --arg url "https://www.npmjs.com/package/@zandoh/keysmith/v/$version" \
            --arg desc "$notes" \
            '{embeds: [{title: $title, url: $url, color: 5793266, description: $desc}]}' \
            | curl -sSf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"
