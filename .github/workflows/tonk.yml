# CI status and release announcements to Discord via the shared tonk layer
# (secret: TONK_DISCORD_WEBHOOK). Personality: .github/discord.yml
#
# Releases are published manually (changeset publish runs locally), so the
# `release` event is user-authored and does trigger this workflow â€” unlike
# GITHUB_TOKEN-published releases, which never would.
name: tonk

on:
  workflow_run:
    workflows: [ci, site]
    types: [completed]
  pull_request:
    types: [opened, reopened, closed]
  issues:
    types: [opened, reopened, closed]
  release:
    types: [published]

jobs:
  notify:
    if: github.event_name == 'workflow_run'
    permissions:
      actions: read # recovery detection reads previous run conclusions
      contents: read # reads .github/discord.yml
    uses: zandoh/tonk/.github/workflows/notify.yml@v2
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}

  pr:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read # reads .github/discord.yml
    uses: zandoh/tonk/.github/workflows/pr.yml@v2
    secrets:
      webhook: ${{ secrets.TONK_DISCORD_WEBHOOK }}

  issues:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: zandoh/tonk@v2
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: đźŽ« Issue #${{ github.event.issue.number }} ${{ github.event.action }}
          description: ${{ github.event.issue.title }} (by ${{ github.event.issue.user.login }})
          url: ${{ github.event.issue.html_url }}
          color: "16756480"

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Prepare release notes
        id: notes
        env:
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
        run: |
          {
            echo "version=${TAG#v}"
            echo 'body<<TONK_NOTES_EOF'
            # Discord embeds don't render markdown headers; bold them instead.
            printf '%s' "$NOTES" | sed -E 's/^#+ +(.*)$/**\1**/'
            echo
            echo TONK_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Announce npm publish on Discord
        uses: zandoh/tonk@v2
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: đź“¦ @zandoh/keysmith ${{ steps.notes.outputs.version }} published to npm
          description: ${{ steps.notes.outputs.body }}
          url: https://www.npmjs.com/package/@zandoh/keysmith/v/${{ steps.notes.outputs.version }}
          color: "5793266"
